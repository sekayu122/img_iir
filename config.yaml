# run_experiment.py default settings.
# Run with: python run_experiment.py FILTER_NAME EXPERIMENT_NAME
input: data/test/src
gt: data/test/gt
eval_before: data/test/src
overwrite: true

# evaluate_img_quarity.py に渡す評価設定。
evaluation:
  # ノイズ低減スコアの100点に相当する低減量[dB]。
  # 暗部ノイズ低減の改善を拾いやすくするため、標準の12dBより少し低めにします。
  # 小さくすると少しのノイズ低減でも高得点になり、大きくするとより強い低減が必要になります。
  target_noise_db: 8.0

  # ブラー評価の0点に相当する after/GT エッジ強度比。
  # 例: 0.6なら、GTの60%までエッジが弱くなるとblur_scoreが0点になります。
  blur_min_ratio: 0.6

  # モーション誤差の0点に相当する正規化誤差。
  # 小さくすると残像や動体ズレに厳しく、大きくすると緩くなります。
  motion_error_ref: 0.08

  # GTフレーム差分から動体領域を検出する閾値。
  # 小さくすると動体判定が増え、大きくすると大きく動いた領域だけを動体として扱います。
  motion_threshold: 0.05

  # これ以下の正規化ノイズ量は、すでに十分クリーンとして扱います。
  # ノイズが非常に少ない入力でNaNや過剰評価を避けるための下限です。
  noise_floor: 0.002

  # PSNRスコアの0点に相当するPSNR[dB]。
  psnr_min_db: 25.0

  # PSNRスコアの100点に相当するPSNR[dB]。
  # 高くすると、GTにより近い画素値でないと高得点になりません。
  psnr_target_db: 40.0

  # SSIMスコアの0点に相当するSSIM値。
  ssim_min: 0.75

  # SSIMスコアの100点に相当するSSIM値。
  # 高くすると、GTにより近い構造を保たないと高得点になりません。
  ssim_target: 0.95

  # 各輝度帯/指標を計算するために必要な最小画素数。
  # 小さすぎる領域の統計値を評価に使わないための設定です。
  min_pixels: 100

  # total_scoreの重み設定。
  # 暗部ノイズ低減を主目的にしつつ、暗部の残像・構造崩れも抑える設定です。
  # normal/highは完全に無視せず、過度な副作用を検出できる程度の重みにします。
  weights:
    dark_noise: 4.0
    dark_motion: 2.0
    dark_ssim: 2.0
    dark_blur: 1.5
    dark_psnr: 1.5
    normal_noise: 0.75
    normal_blur: 0.75
    normal_motion: 0.75
    normal_psnr: 0.75
    normal_ssim: 0.75
    high_noise: 0.5
    high_blur: 0.5
    high_motion: 0.5
    high_psnr: 0.5
    high_ssim: 0.5

  # 暗部ノイズ評価に使う静止ROI。
  # 空の場合は輝度から自動でdark領域を選びます。
  # 形式は "x,y,width,height"、または下のようなmap形式です。
  # 例:
  #   - "10,20,160,120"
  #   - {x: 10, y: 20, width: 160, height: 120}
  dark_rois: []

# best更新前に確認するvalidation設定。
# dev_loop.pyはtrain評価後に以下をすべて実行し、すべてmin_total_score以上の場合だけbestを更新します。
# validationの出力先は、必須引数のEXPERIMENT_NAMEから自動生成します。
validations:
  - name: validation_synthetic
    input: data/validation_synthetic/test
    gt: data/validation_synthetic/gt
    eval_before: data/validation_synthetic/src
    overwrite: true
    min_total_score: 70.0

  - name: validation_skimage
    input: data/validation_skimage/test
    gt: data/validation_skimage/gt
    eval_before: data/validation_skimage/src
    overwrite: true
    min_total_score: 70.0
